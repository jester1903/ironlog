<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a14;min-height:100%;font-family:'Segoe UI',system-ui,sans-serif;color:#e8e8f0;overscroll-behavior:none}
input,select,button,textarea{font-family:inherit;font-size:14px}

.styleCard{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 12px;border-radius:12px;border:2px solid;background:rgba(255,255,255,.03);cursor:pointer;text-align:center;width:100%}

.fBtn{padding:5px 10px;border-radius:20px;border:1px solid #222;background:transparent;color:#666;cursor:pointer;font-size:11px;font-weight:700}

/* sync status */
#syncBar{position:fixed;bottom:0;left:0;right:0;z-index:99;padding:6px 16px;font-size:12px;font-weight:700;text-align:center;transition:all .3s;display:none}
#syncBar.show{display:block}
#syncBar.syncing{background:rgba(243,156,18,.15);color:#f39c12;border-top:1px solid rgba(243,156,18,.3)}

/* device pick */

<script>
// ── SUPABASE CONFIG ───────────────────────────────────────────────
const SB_URL = "https://nbkaaztnuehdqhnxpacf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ia2FhenRudWVoZHFobnhwYWNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NDQ4MjcsImV4cCI6MjA5NzMyMDgyN30.NdO1RoZ9KFB59Qb0yvopuM-R0d_qKSkp6MNfcmo5RXE";

async function sbFetch(path, options={}){
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      "apikey": SB_KEY,
      "Authorization": `Bearer ${SB_KEY}`,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "return=representation",
      ...(options.headers||{})
    }
  });
  if(!res.ok){ const t=await res.text(); throw new Error(t); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

const sbGet    = (table, params="") => sbFetch(`${table}?${params}`);
const sbInsert = (table, data)      => sbFetch(table, {method:"POST", body:JSON.stringify(data)});
const sbUpsert = (table, data)      => sbFetch(table, {method:"POST", body:JSON.stringify(data), prefer:"resolution=merge-duplicates,return=representation"});
const sbDelete = (table, params)    => sbFetch(`${table}?${params}`, {method:"DELETE", prefer:"return=minimal"});
const sbUpdate = (table, params, data) => sbFetch(`${table}?${params}`, {method:"PATCH", body:JSON.stringify(data), prefer:"return=minimal"});

// ── LOCAL STORAGE (offline cache) ────────────────────────────────
const K={profile:"il_pro",checkins:"il_chk",styles:"il_sty",exercises:"il_ex",movements:"il_mv",logs:"il_log",dismiss:"il_dis",pid:"il_pid"};
const ls=(k,fb)=>{try{const v=localStorage.getItem(k);if(v)return JSON.parse(v);}catch{}return fb;};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ── SEED ─────────────────────────────────────────────────────────
function SEED_STYLES(pid){return[
  {id:"s1",profile_id:pid,name:"İtiş (Göğüs-Omuz-Triceps)",color:"#e74c3c",icon:"🔼"},
  {id:"s2",profile_id:pid,name:"Çekiş (Sırt-Biceps)",color:"#3498db",icon:"🔽"},
  {id:"s3",profile_id:pid,name:"Bacak",color:"#27ae60",icon:"🦵"},
  {id:"s4",profile_id:pid,name:"Karın & Kondisyon",color:"#f39c12",icon:"🎯"},
];}
function SEED_EX(pid){return[
  {id:"e1",profile_id:pid,movement_id:"m1",name:"Bench Press",style_id:"s1",sets:4,reps:8,type:"reps",superset:false},
  {id:"e2",profile_id:pid,movement_id:"m2",name:"İnkline Dumbbell",style_id:"s1",sets:3,reps:12,type:"reps",superset:false},
  {id:"e3",profile_id:pid,movement_id:"m3",name:"Overhead Press",style_id:"s1",sets:4,reps:8,type:"reps",superset:false},
  {id:"e4",profile_id:pid,movement_id:"m4",name:"Lateral Raise",style_id:"s1",sets:3,reps:15,type:"reps",superset:true},
  {id:"e5",profile_id:pid,movement_id:"m5",name:"Dips",style_id:"s1",sets:3,reps:12,type:"reps",superset:false},
  {id:"e6",profile_id:pid,movement_id:"m6",name:"Tricep Pushdown",style_id:"s1",sets:3,reps:15,type:"reps",superset:false},
  {id:"e7",profile_id:pid,movement_id:"m7",name:"Deadlift",style_id:"s2",sets:4,reps:5,type:"reps",superset:false},
  {id:"e8",profile_id:pid,movement_id:"m8",name:"Barbell Row",style_id:"s2",sets:4,reps:8,type:"reps",superset:false},
  {id:"e9",profile_id:pid,movement_id:"m9",name:"Lat Pulldown",style_id:"s2",sets:3,reps:12,type:"reps",superset:false},
  {id:"e10",profile_id:pid,movement_id:"m10",name:"Face Pull",style_id:"s2",sets:3,reps:15,type:"reps",superset:false},
  {id:"e11",profile_id:pid,movement_id:"m11",name:"Bicep Curl",style_id:"s2",sets:3,reps:12,type:"reps",superset:false},
  {id:"e12",profile_id:pid,movement_id:"m12",name:"Hammer Curl",style_id:"s2",sets:3,reps:12,type:"reps",superset:true},
  {id:"e13",profile_id:pid,movement_id:"m13",name:"Squat",style_id:"s3",sets:4,reps:8,type:"reps",superset:false},
  {id:"e14",profile_id:pid,movement_id:"m14",name:"Leg Press",style_id:"s3",sets:3,reps:12,type:"reps",superset:false},
  {id:"e15",profile_id:pid,movement_id:"m15",name:"Romanian Deadlift",style_id:"s3",sets:3,reps:10,type:"reps",superset:false},
  {id:"e16",profile_id:pid,movement_id:"m16",name:"Leg Curl",style_id:"s3",sets:3,reps:12,type:"reps",superset:false},
  {id:"e17",profile_id:pid,movement_id:"m17",name:"Calf Raise",style_id:"s3",sets:4,reps:15,type:"reps",superset:false},
  {id:"e18",profile_id:pid,movement_id:"m18",name:"Plank",style_id:"s4",sets:3,reps:60,type:"duration",superset:false},
  {id:"e19",profile_id:pid,movement_id:"m19",name:"Cable Crunch",style_id:"s4",sets:3,reps:15,type:"reps",superset:false},
  {id:"e20",profile_id:pid,movement_id:"m20",name:"Hanging Leg Raise",style_id:"s4",sets:3,reps:12,type:"reps",superset:false},
  {id:"e21",profile_id:pid,movement_id:"m21",name:"Russian Twist",style_id:"s4",sets:3,reps:20,type:"reps",superset:false},
];}
function SEED_MOVEMENTS(pid){
  return SEED_EX(pid).map(e=>({id:e.movement_id,profile_id:pid,name:e.name}));
}

// ── STATE ─────────────────────────────────────────────────────────
let profileId  = ls(K.pid, null);
let profile    = ls(K.profile, null);
let checkins   = ls(K.checkins, []);
let styles     = ls(K.styles, []);
let exercises  = ls(K.exercises, []);
let movements  = ls(K.movements, []);
let logs       = ls(K.logs, []);
let dismiss    = ls(K.dismiss, null);
let activeTab  = "workout";
let workoutStartedAt=null;
let workoutStyle=null, workoutExercises=[], workoutWeights={}, workoutDone={}, workoutReps={};
let workoutStep=0;

function cacheAll(){
  ss(K.pid,profileId);ss(K.profile,profile);ss(K.checkins,checkins);
  ss(K.styles,styles);ss(K.exercises,exercises);ss(K.movements,movements);ss(K.logs,logs);ss(K.dismiss,dismiss);
}

// ── SYNC STATUS BAR ───────────────────────────────────────────────
function showSync(state, msg){
  const b=document.getElementById("syncBar");
  b.className="show "+state; b.textContent=msg;
  if(state==="ok") setTimeout(()=>{b.className="";},2000);
}

// ── SUPABASE LOAD ─────────────────────────────────────────────────
async function loadFromSupabase(pid){
  showSync("syncing","⟳ Veriler yükleniyor…");
  try{
    const [chk, sty, ex, mv, lg] = await Promise.all([
      sbGet("checkins",`profile_id=eq.${pid}&order=date.desc`),
      sbGet("styles",`profile_id=eq.${pid}`),
      sbGet("exercises",`profile_id=eq.${pid}&order=order_index.asc`),
      sbGet("movements",`profile_id=eq.${pid}`),
      sbGet("logs",`profile_id=eq.${pid}&order=timestamp.desc`),
    ]);
    checkins  = chk;
    styles    = sty;
    exercises = ex.map(e=>({...e,styleId:e.style_id}));
    movements = mv;
    logs      = lg.map(l=>({...l,styleId:l.style_id,dateISO:l.date_iso}));

    // Otomatik göç: movement_id'si olmayan eski hareketler için kütüphane kaydı oluştur
    const needsMigration = exercises.filter(e=>!e.movement_id);
    if(needsMigration.length>0){
      showSync("syncing","⟳ Hareket kütüphanesi oluşturuluyor…");
      const newMovements=[];
      const movementMap={}; // name(lowercase) -> movement_id, aynı isimde tekrar oluşturmamak için
      for(const ex of needsMigration){
        const nameKey=ex.name.trim().toLowerCase();
        let movId=movementMap[nameKey];
        if(!movId){
          // Önce zaten yüklenmiş movements içinde var mı bak
          const existing=movements.find(m=>m.name.trim().toLowerCase()===nameKey);
          if(existing){
            movId=existing.id;
          }else{
            movId=uid();
            newMovements.push({id:movId,profile_id:pid,name:ex.name});
          }
          movementMap[nameKey]=movId;
        }
        ex.movement_id=movId;
      }
      if(newMovements.length>0){
        await sbUpsert("movements", newMovements);
        movements=[...movements,...newMovements];
      }
      // exercises tablosunda movement_id güncelle
      await Promise.all(needsMigration.map(ex=>
        sbUpdate("exercises",`id=eq.${ex.id}`,{movement_id:ex.movement_id})
      ));
    }

    cacheAll();
    showSync("ok","✓ Senkronize edildi");
  }catch(e){
    console.error(e);
    showSync("err","⚠ Bağlantı hatası — çevrimdışı çalışılıyor");
  }
}

// ── UTILS ─────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const todayISO=()=>new Date().toISOString().slice(0,10);
const todayTR=()=>new Date().toLocaleDateString("tr-TR");
const shortDate=iso=>{try{return new Date(iso).toLocaleDateString("tr-TR",{day:"2-digit",month:"short"});}catch{return iso;}};
const daysBetween=(a,b)=>Math.abs((new Date(b)-new Date(a))/864e5);
const el=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;};
const $=(s)=>document.querySelector(s);

function lastWeights(exId){
  for(const log of logs){
    const e=log.entries?.find(e=>e.exerciseId===exId);
    if(e){
      const ws=e.sets?.map(s=>s.weight).filter(Boolean);
      const reps=e.sets?.map(s=>s.reps);
      if(ws?.length)return{date:log.date,weights:ws,reps:reps||[]};
    }
  }return null;
}
function exSessions(exId){
  const out=[];
  [...logs].sort((a,b)=>(a.timestamp||0)-(b.timestamp||0)).forEach(log=>{
    const e=log.entries?.find(e=>e.exerciseId===exId);if(!e)return;
    const ws=(e.sets||[]).map(s=>parseFloat(s.weight)).filter(w=>!isNaN(w)&&w>0);
    if(!ws.length)return;
    const reps=(e.sets||[]).map(s=>parseInt(s.reps)).filter(r=>!isNaN(r)&&r>0);
    const avgReps=reps.length?Math.round(reps.reduce((a,b)=>a+b,0)/reps.length):null;
    out.push({label:log.date,max:Math.max(...ws),avgReps});
  });return out;
}
function groupBlocks(exs){
  // Yeni sistem: superset_group ID'si aynı olan hareketler aynı blokta
  // Eski sistem fallback: superset:true olan hareket bir öncekiyle gruplanır
  const blocks=[];
  let i=0;
  while(i<exs.length){
    const ex=exs[i];
    // superset_group varsa: aynı group_id'li ardışık hareketleri topla
    if(ex.superset_group){
      const block=[ex];
      let j=i+1;
      while(j<exs.length && exs[j].superset_group===ex.superset_group){
        block.push(exs[j]);j++;
      }
      blocks.push(block);i=j;
    } else {
      // Eski boolean fallback
      const block=[ex];
      let j=i+1;
      while(j<exs.length && exs[j].superset && !exs[j].superset_group){
        block.push(exs[j]);j++;
      }
      blocks.push(block);i=j;
    }
  }
  return blocks;
}
function getStyle(id){return styles.find(s=>s.id===id)||{name:id,color:"#888",icon:"?"};}
function getEx(id){
  const ex=exercises.find(e=>e.id===id);
  if(ex)return ex;
  // Hareket programdan silinmiş olsa bile log kayıtlarından adını bul
  for(const log of logs){
    const entry=log.entries?.find(e=>e.exerciseId===id);
    if(entry?.exerciseName)return{name:entry.exerciseName,id};
  }
  return{name:"(Silinmiş Hareket)",id};
}
function getMovement(id){return movements.find(m=>m.id===id)||{name:"?"};}

async function submitOnboarding(){
  const name=$('#obName').value.trim(),height=+$('#obHeight').value,weight=+$('#obWeight').value,fat=+$('#obFat').value;
  if(!name||!height||!weight){alert("Ad, boy ve kilo zorunlu!");return;}
  showSync("syncing","⟳ Profil oluşturuluyor…");
  try{
    // Check if profile exists with same name
    const existing = await sbGet("profiles",`name=eq.${encodeURIComponent(name)}`);
    let pid;
    if(existing.length>0){
      pid = existing[0].id;
      profile = existing[0];
    } else {
      pid = uid();
      const [p] = await sbInsert("profiles",[{id:pid,name,height}]);
      profile = p;
      // Insert seed data
      const seedSty = SEED_STYLES(pid);
      const seedMv  = SEED_MOVEMENTS(pid);
      const seedEx  = SEED_EX(pid);
      await sbUpsert("styles", seedSty);
      await sbUpsert("movements", seedMv);
      await sbUpsert("exercises", seedEx.map(e=>({...e,style_id:e.style_id})));
      styles    = seedSty;
      movements = seedMv;
      exercises = seedEx;
    }
    profileId = pid;
    const [ci] = await sbInsert("checkins",[{id:uid(),profile_id:pid,date:todayISO(),weight,body_fat:fat||null}]);
    checkins = [ci];
    cacheAll();
    showSync("ok","✓ Profil oluşturuldu");
    $('#hdr').style.display="";main.style.marginTop="";
    render();
  }catch(e){console.error(e);showSync("err","⚠ Hata: "+e.message);}
}

}

function renderWorkoutPreview(main){
  const exs=workoutExercises;
  const totalSets=exs.reduce((sum,e)=>sum+(e.sets||0),0);

  // Başlık + geri butonu
  const hdr=el("div");

    <div>
      <span class="badge" style="background:${workoutStyle.color}33;color:${workoutStyle.color};font-size:14px">${workoutStyle.icon} ${workoutStyle.name}</span>
      <span style="font-size:12px;color:#555;margin-left:10px">${exs.length} hareket · ${totalSets} set</span>
    </div>`;
  main.appendChild(hdr);

  // Hareket listesi (önizleme)

        wrap.appendChild(buildPreviewCard(ex,`${bi+1}${String.fromCharCode(65+idx)}`));

  });

  if(!exs.length){

    main.appendChild(e);
  }

  // Başlat butonu
  const footer=el("div");
  footer.style.cssText="position:sticky;bottom:0;padding:16px 0 8px;background:linear-gradient(transparent,#0a0a14 40%);margin-top:16px";
  footer.innerHTML=`<button class="btn" style="width:100%;font-size:16px;padding:14px" onclick="startWorkout()">▶ Antrenmanı Başlat</button>`;
  main.appendChild(footer);

function buildPreviewCard(ex,label){
  const isDur=ex.type==="duration";
  const valDisplay=isDur?`${Math.floor(ex.reps/60)}:${String(ex.reps%60).padStart(2,"0")} dk:sn`:`${ex.reps} tekrar`;
  const hasTarget=ex.target_weight!=null && ex.target_weight!=="";

  card.style.cssText="background:rgba(255,255,255,.03);border-radius:12px;border:1px solid rgba(255,255,255,.07);padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px";
  card.innerHTML=`
    <div style="flex:1">
      <div style="font-size:14px;font-weight:800;color:#e8e8f0">
        ${label?`<span class="lblBadge">${label}</span>`:""}${ex.name}
      </div>
      <div style="font-size:12px;color:#666;margin-top:3px">${ex.sets} set × ${valDisplay}</div>
      ${hasTarget?`<div style="margin-top:4px"><span class="targetChip">🎯 Hedef: ${ex.target_weight} kg</span></div>`:
        last?`<div style="margin-top:4px;font-size:11px;color:#555">Son: ${last.weights[0]} kg</div>`:""}
    </div>
    <div style="font-size:22px;color:rgba(255,255,255,.08);font-weight:900">${ex.sets}×</div>`;
  return card;
}

function startWorkout(){
  workoutWeights={};workoutDone={};workoutReps={};workoutStartedAt=Date.now();workoutStep=2;
  render();
}

function renderWorkoutActive(main){
  const allKeys=workoutExercises.flatMap(ex=>Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`));
  const doneC=allKeys.filter(k=>workoutDone[k]).length;
  const prog=allKeys.length?doneC/allKeys.length:0;
  const C=2*Math.PI*20;
  const startTimeStr=new Date(workoutStartedAt).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
  const tb=el("div");tb.id="timerBar";
  tb.innerHTML=`<div>
    <div style="font-size:13px;color:#666;margin-bottom:4px">⏱ Başlangıç: <strong style="color:#e8e8f0">${startTimeStr}</strong></div>
    <span class="badge" style="background:${workoutStyle.color}33;color:${workoutStyle.color}">${workoutStyle.icon} ${workoutStyle.name}</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div style="position:relative;width:52px;height:52px;flex-shrink:0">
      <svg width="52" height="52">
        <circle cx="26" cy="26" r="20" fill="none" stroke="#1a1a2e" stroke-width="4"/>
        <circle id="progCircle" cx="26" cy="26" r="20" fill="none" stroke="#00d4ff" stroke-width="4"
          stroke-dasharray="${C}" stroke-dashoffset="${C*(1-prog)}"
          style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .4s"/>
      </svg>
      <span id="progPct" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#00d4ff">${Math.round(prog*100)}%</span>
    </div>
    <button class="btn" onclick="finishWorkout()">✓ BİTİR</button>
  </div>`;
  main.appendChild(tb);
  if(!workoutExercises.length){main.innerHTML+=`<div class="empty">Bu programa hareket eklenmemiş.<br><br><button class="btn-ghost" onclick="cancelWorkout()">← Geri</button></div>`;return;}
  groupBlocks(workoutExercises).forEach((block,bi)=>{
    if(block.length===1){main.appendChild(buildExCard(block[0],null));return;}
    const wrap=el("div","ssBlock");
    wrap.innerHTML=`<div class="ssLabel">🔗 SÜPERSET — Dinlenmeden ardı ardına yap</div>`;
    block.forEach((ex,idx)=>{
      if(idx>0){const p=el("div");p.style.cssText="text-align:center;color:#a78bfa;font-size:18px;font-weight:900;padding:2px 0";p.textContent="+";wrap.appendChild(p);}
      wrap.appendChild(buildExCard(ex,`${bi+1}${String.fromCharCode(65+idx)}`));
    });
    main.appendChild(wrap);
  });
}

function buildExCard(ex,label){
  const last=lastWeights(ex.id);
  const isDur=ex.type==="duration";
  const hasTarget=ex.target_weight!=null && ex.target_weight!=="";
  const card=el("div","exCard");
  let lastHtml="";
  if(last)lastHtml=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px"><span style="font-size:11px;color:#555">Son (${last.date}):</span>${last.weights.map(w=>`<span class="wChip">${w} kg</span>`).join("")}</div>`;
  if(hasTarget)lastHtml+=`<div style="margin-top:4px"><span class="targetChip">🎯 Hedef: ${ex.target_weight} kg</span></div>`;
  const headerRight=isDur?`${ex.sets}×${Math.floor(ex.reps/60)}:${String(ex.reps%60).padStart(2,"0")}`:`${ex.sets}×${ex.reps}`;
  card.innerHTML=`<div class="exHdr">
    <div><div class="exName">${label?`<span class="lblBadge">${label}</span>`:""}${ex.name}</div>${lastHtml}</div>
    <span style="font-size:11px;color:#555;flex-shrink:0">${headerRight}</span>
  </div><div id="sets_${ex.id}"></div>`;
  const setsDiv=card.querySelector(`#sets_${ex.id}`);
  for(let i=0;i<ex.sets;i++){
    const k=`${ex.id}_${i}`,isDone=!!workoutDone[k];
    const prevW=last?.weights[i]??last?.weights[0]??"";
    // Hedef ağırlık varsa, kg kutusunda varsayılan olarak onu göster ve farklı renkte rozet kullan
    const weightDefault = hasTarget ? ex.target_weight : (workoutWeights[k]||"");
    const isTargetSet = hasTarget && !workoutWeights[k];
    // Son antrenmanda bu set için girilen tekrar/süre tanımlanan hedeften yüksekse, onu varsayılan göster (progressive overload)
    const lastRepVal=last?.reps?.[i];
    const baseTarget=(lastRepVal!=null && +lastRepVal>ex.reps) ? +lastRepVal : ex.reps;
    const row=el("div","setRow");
    if(isDone)row.style.opacity="0.45";
    let middleHtml;
    if(isDur){
      const durVal=workoutReps[k]!=null?workoutReps[k]:baseTarget;
      const dm=Math.floor(durVal/60), ds=durVal%60;
      middleHtml=`<div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
        <input type="number" class="wInp durMin" style="width:38px" value="${dm}" min="0" data-exid="${ex.id}" data-set="${i}"/>
        <span style="font-size:10px;color:#555">dk</span>
        <input type="number" class="wInp durSec" style="width:38px" value="${ds}" min="0" max="59" data-exid="${ex.id}" data-set="${i}"/>
        <span style="font-size:10px;color:#555">sn</span>
      </div>`;
    }else{
      const repsVal=workoutReps[k]??baseTarget;
      middleHtml=`<div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
        <input type="number" class="wInp repInp" style="width:44px" value="${repsVal}" data-exid="${ex.id}" data-set="${i}" data-kind="reps"/>
        <span style="font-size:10px;color:#555">tekrar</span>${baseTarget>ex.reps?`<span style="font-size:9px;color:#27ae60">▲</span>`:""}
      </div>`;
    }
    row.innerHTML=`<span style="font-size:12px;color:#555;width:42px;flex-shrink:0">Set ${i+1}</span>
      ${prevW?`<span class="prevBadge">Önceki: ${prevW} kg</span>`:""}
      ${middleHtml}
      <div style="display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-end">
        <input type="number" class="wInp${isTargetSet?" targetInput":""}" placeholder="${prevW||'kg'}" value="${weightDefault}" data-exid="${ex.id}" data-set="${i}" data-kind="weight"/>
        <span style="font-size:11px;color:#555">kg</span>
      </div>
      <button class="doneBtn${isDone?" on":""}" data-key="${k}">${isDone?"✓":"○"}</button>`;
    setsDiv.appendChild(row);
    if(isTargetSet && !workoutWeights[k]) workoutWeights[k]=String(ex.target_weight);
  }
  // ── Bir sonraki idman için hedef ağırlık belirleme ──
  const targetBox=el("div");
  targetBox.style.cssText="padding:8px 14px 12px;border-top:1px solid rgba(255,255,255,.04);margin-top:4px";
  targetBox.innerHTML=`<label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#aaa;cursor:pointer">
    <input type="checkbox" class="targetToggle" data-exid="${ex.id}" ${hasTarget?"checked":""} style="width:16px;height:16px;accent-color:#e74c3c;flex-shrink:0"/>
    📈 Bir sonraki idmanda ağırlık artırmak ister misin?
  </label>
  <div class="targetInputWrap" data-exid="${ex.id}" style="display:${hasTarget?"flex":"none"};align-items:center;gap:8px;margin-top:8px;padding-left:24px">
    <span style="font-size:11px;color:#666">Hedef ağırlık:</span>
    <input type="number" class="inp targetWeightInput" data-exid="${ex.id}" value="${ex.target_weight||''}" placeholder="örn. 115" style="width:90px"/>
    <span style="font-size:11px;color:#666">kg</span>
    <button class="btn-ghost saveTargetBtn" data-exid="${ex.id}" style="padding:5px 10px;font-size:11px">💾 Kaydet</button>
  </div>`;
  card.appendChild(targetBox);

  card.querySelectorAll('.wInp[data-kind="weight"]').forEach(inp=>{
    inp.addEventListener('input',function(){
      const exId=this.dataset.exid,si=+this.dataset.set,v=this.value;
      this.classList.remove('targetInput');
      if(si===0){
        const ex2=exercises.find(e=>e.id===exId);
        if(ex2)for(let j=0;j<ex2.sets;j++)workoutWeights[`${exId}_${j}`]=v;
        card.querySelectorAll('.wInp[data-kind="weight"]').forEach((x,i)=>{if(i>0){x.value=v;x.classList.remove('targetInput');}});
      }
      else workoutWeights[`${exId}_${si}`]=v;
    });
  });
  card.querySelectorAll('.repInp').forEach(inp=>{
    inp.addEventListener('input',function(){
      const exId=this.dataset.exid,si=+this.dataset.set;
      workoutReps[`${exId}_${si}`]=this.value;
    });
  });
  card.querySelectorAll('.durMin,.durSec').forEach(inp=>{
    inp.addEventListener('input',function(){
      const exId=this.dataset.exid,si=+this.dataset.set;
      const row=this.closest('.setRow');
      const min=+row.querySelector('.durMin').value||0;
      const sec=+row.querySelector('.durSec').value||0;
      workoutReps[`${exId}_${si}`]=min*60+sec;
    });
  });
  card.querySelectorAll('.doneBtn').forEach(btn=>{
    btn.addEventListener('click',function(){
      const k=this.dataset.key;workoutDone[k]=!workoutDone[k];
      this.textContent=workoutDone[k]?"✓":"○";this.classList.toggle("on",workoutDone[k]);
      this.closest('.setRow').style.opacity=workoutDone[k]?"0.45":"1";updateProgress();
    });
  });
  card.querySelector('.targetToggle')?.addEventListener('change',function(){
    const wrap=card.querySelector(`.targetInputWrap[data-exid="${this.dataset.exid}"]`);
    if(wrap)wrap.style.display=this.checked?"flex":"none";
    if(!this.checked) saveTargetWeight(this.dataset.exid, null);
  });
  card.querySelector('.saveTargetBtn')?.addEventListener('click',function(){
    const exId=this.dataset.exid;
    const input=card.querySelector(`.targetWeightInput[data-exid="${exId}"]`);
    const val=input?.value;
    if(!val){alert("Hedef ağırlık gir!");return;}
    saveTargetWeight(exId, +val);
  });
  return card;
}

async function saveTargetWeight(exId, val){
  showSync("syncing","⟳ Kaydediliyor…");
  try{
    await sbUpdate("exercises",`id=eq.${exId}`,{target_weight:val});
    exercises=exercises.map(e=>e.id===exId?{...e,target_weight:val}:e);
    workoutExercises=workoutExercises.map(e=>e.id===exId?{...e,target_weight:val}:e);
    cacheAll();
    showSync("ok", val?"✓ Hedef kaydedildi":"✓ Hedef kaldırıldı");
  }catch(e){showSync("err","⚠ Hata");console.error(e);}
}

function updateProgress(){
  const allKeys=workoutExercises.flatMap(ex=>Array.from({length:ex.sets},(_,i)=>`${ex.id}_${i}`));
  const prog=allKeys.length?allKeys.filter(k=>workoutDone[k]).length/allKeys.length:0;
  const C=2*Math.PI*20;
  const c=$('#progCircle');const t=$('#progPct');

}
async function finishWorkout(){

    started_at:workoutStartedAt,finished_at:finishedAt,
    entries:workoutExercises.map(ex=>({exerciseId:ex.id,exerciseName:ex.name,sets:Array.from({length:ex.sets},(_,i)=>({setNum:i+1,reps:workoutReps[`${ex.id}_${i}`]??ex.reps,weight:workoutWeights[`${ex.id}_${i}`]||"",done:!!workoutDone[`${ex.id}_${i}`]}))}))
  };

  showSync("syncing","⟳ Antrenman kaydediliyor…");
  try{
    await sbInsert("logs",[{id:logId,profile_id:profileId,date:entry.date,date_iso:entry.date_iso,timestamp:entry.timestamp,style_id:entry.style_id,duration:entry.duration,entries:entry.entries}]);

}

function renderCharts(main){
  const items=exercises.map(ex=>({ex,sess:exSessions(ex.id)})).filter(x=>x.sess.length>0);
  if(!items.length){main.innerHTML+=`<div class="empty">Henüz ağırlık girilmiş antrenman yok.</div>`;return;}
  items.forEach(({ex,sess})=>{
    const st=getStyle(ex.styleId||ex.style_id);
    const first=sess[0],last=sess[sess.length-1],diff=+(last.max-first.max).toFixed(1);
    let tIcon="➖",tLabel="Sabit",tColor="#888";
    if(sess.length>=2){const d=+(last.max-sess[sess.length-2].max).toFixed(1);if(d>0){tIcon="▲";tLabel=`+${d} kg`;tColor="#27ae60";}else if(d<0){tIcon="▼";tLabel=`${d} kg`;tColor="#e74c3c";}else{tIcon="➖";tLabel="Sabit";tColor="#f39c12";}}
    const card=el("div","progCard");
    const data=sess.map(s=>s.max),max=Math.max(...data),min=Math.min(...data),range=max-min||1;
    const W=300,H=60,pts=data.map((v,i)=>({x:(i/(data.length-1||1))*W,y:H-((v-min)/range)*(H-12)-6}));
    const poly=data.length>1?`<polyline points="${pts.map(p=>`${p.x},${p.y}`).join(" ")}" fill="none" stroke="#00d4ff" stroke-width="2"/>${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#00d4ff"/>`).join("")}`:`<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#00d4ff" font-size="12">${data[0]} kg</text>`;
    // Tekrar/süre hedefinin altında mı kontrolü
    const isDur=ex.type==="duration";
    const lastVal=last.avgReps;
    const targetVal=ex.reps;
    let repsHtml="";
    if(lastVal!=null){
      const under=lastVal<targetVal;
      const fmtVal=v=>isDur?`${Math.floor(v/60)}:${String(v%60).padStart(2,"0")}`:v;
      repsHtml=`<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:${under?"rgba(231,76,60,.12)":"rgba(39,174,96,.12)"};color:${under?"#e74c3c":"#27ae60"}">
        ${under?"⚠":"✓"} Ort. ${fmtVal(lastVal)}${isDur?"":" tekrar"} ${under?`(hedef ${fmtVal(targetVal)})`:""}
      </span>`;
    }
    card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;flex-wrap:wrap">
      <div><div style="font-size:15px;font-weight:800;margin-bottom:4px">${ex.name}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span style="font-size:11px;padding:2px 8px;border-radius:12px;background:${st.color}18;color:${st.color}">${st.icon} ${st.name}</span>
        ${repsHtml}
      </div></div>
      <div style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;border:1px solid ${tColor}55;background:${tColor}15;color:${tColor}">${tIcon} ${tLabel}</div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${H}px">${poly}</svg>
    <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:#666;margin-top:8px">
      <span>İlk: <strong style="color:#aaa">${first.max} kg</strong></span>
      <span>Son: <strong style="color:#00d4ff">${last.max} kg</strong></span>
      ${sess.length>=2?`<span style="color:${diff>0?"#27ae60":diff<0?"#e74c3c":"#888"}">${diff>0?"+":""}${diff} kg toplam</span>`:""}
      <span style="color:#444">${sess.length} antrenman</span>
    </div>`;
    main.appendChild(card);
  });
}

function miniChart(data,color){

}

    <label class="lbl">Set<input id="exSets" type="number" min="1" max="20" class="inp" value="${exForm.sets}" style="width:80px"/></label>

    <label class="lbl">Süre (dk)<input id="exDurMin" type="number" min="0" class="inp" value="${Math.floor((exForm.reps||0)/60)}" style="width:70px"/></label>
    <label class="lbl">Süre (sn)<input id="exDurSec" type="number" min="0" max="59" class="inp" value="${(exForm.reps||0)%60}" style="width:70px"/></label>
    `:`
    <label class="lbl">Tekrar<input id="exReps" type="number" min="1" class="inp" value="${exForm.reps}" style="width:80px"/></label>
    `}
  </div>
  <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:${canSS?"#aaa":"#444"};padding:8px 10px;border-radius:8px;background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.15);margin-bottom:12px;cursor:${canSS?"pointer":"default"}">
    <input type="checkbox" id="exSS"${canSS&&exForm.superset?" checked":""} ${canSS?"":"disabled"} style="width:16px;height:16px;accent-color:#a78bfa"/>
    ${canSS?`🔗 Süperset — <strong style="color:#a78bfa">"${prevEx.name}"</strong> ile ardı ardına`:"🔗 Süperset (önce bir hareket eklenmeli)"}
  </label>

    <button class="btn" onclick="submitEx()">${exEditId?"💾 Güncelle":"➕ Programa Ekle"}</button>
    ${exEditId?`<button class="btn-ghost" onclick="cancelExEdit()">İptal</button>`:""}
  </div>`;
  main.appendChild(fc);
  const fr=el("div");fr.style.marginBottom="12px";
  fr.innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <input class="inp" style="flex:1;min-width:130px" placeholder="🔍 Ara..." value="${exSearch}" oninput="exSearch=this.value;render()"/>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${[{id:"",name:"Tümü"},...styles].map(s=>`<button class="fBtn${exFilter===s.id?" active":""}" onclick="exFilter='${s.id}';render()">${s.icon||""} ${s.name}</button>`).join("")}</div>
  </div>`;
  main.appendChild(fr);
  const filtered=exercises.filter(e=>exFilter?(e.styleId||e.style_id)===exFilter:true).filter(e=>exSearch?e.name.toLowerCase().includes(exSearch.toLowerCase()):true);
  const tw=el("div","tblWrap");let rows="";
  filtered.forEach(ex=>{
    const st=getStyle(ex.styleId||ex.style_id);
    const isD=ex.type==="duration";
    const valDisplay=isD?`${Math.floor(ex.reps/60)}:${String(ex.reps%60).padStart(2,"0")}`:ex.reps;
    rows+=`<tr><td>
        <strong style="color:#e8e8f0">${ex.name}</strong>
        ${ex.superset_group?`<span class="ssBadge">🔗 grup ${ex.superset_group.slice(-4)}</span>`:(ex.superset?`<span class="ssBadge">🔗 süperset</span>`:"")}
      </td>
      <td><span style="font-size:11px;padding:2px 8px;border-radius:12px;background:${st.color}18;color:${st.color}">${st.icon} ${st.name}</span></td>
      <td style="text-align:center"><span class="tag2">${ex.sets}</span></td>
      <td style="text-align:center"><span class="tag2">${isD?"⏱ ":""}${valDisplay}</span></td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn-edit exBtn" style="padding:4px 7px" data-action="up" data-id="${ex.id}">↑</button>
        <button class="btn-edit exBtn" style="padding:4px 7px" data-action="down" data-id="${ex.id}">↓</button>
        <button class="btn-edit exBtn" style="color:#a78bfa;padding:4px 7px" data-action="ss" data-id="${ex.id}" title="Süperset bağla/ayır">🔗</button>
        <button class="btn-edit exBtn" data-action="edit" data-id="${ex.id}">✏️</button>
        <button class="btn-red exBtn" data-action="del" data-id="${ex.id}">🗑️</button>
      </td></tr>`;
  });
  tw.innerHTML=`<table class="tbl"><thead><tr><th>Hareket</th><th>Program</th><th style="text-align:center">Set</th><th style="text-align:center">Tekrar/Süre</th><th style="text-align:right">İşlem</th></tr></thead><tbody>${rows||`<tr><td colspan="5" style="text-align:center;color:#444;padding:28px 0">Bu programa henüz hareket atanmamış</td></tr>`}</tbody></table>
  <div style="padding:8px 14px;font-size:11px;color:#444;border-top:1px solid rgba(255,255,255,.05)">${filtered.length} kayıt • ${exercises.length} toplam</div>`;
  // Event delegation — data-* attribute ile buton olaylarını yakala
  tw.addEventListener('click',function(e){
    const btn=e.target.closest('.exBtn');
    if(!btn)return;
    e.stopPropagation();
    const id=btn.dataset.id;
    const action=btn.dataset.action;
    if(action==='up')moveEx(id,'up');
    else if(action==='down')moveEx(id,'down');
    else if(action==='ss')toggleSupersetUI(id);
    else if(action==='edit')startExEdit(id);
    else if(action==='del')delEx(id);
  });
  main.appendChild(tw);
}
function exStyleChange(v){exForm={...exForm,styleId:v,superset:false};render();}
function exTypeChange(t){exForm={...exForm,type:t};render();}
async function submitEx(){
  const movementId=$('#exMovement')?.value,styleId=$('#exStyle')?.value,sets=+$('#exSets')?.value,superset=$('#exSS')?.checked||false;
  const type=exForm.type||"reps";
  if(!movementId){alert("Kütüphaneden bir hareket seçmelisin!");return;}
  if(!styleId){alert("Program seçmelisin!");return;}
  const mv=movements.find(m=>m.id===movementId);
  const name=mv?mv.name:"";
  let reps;
  if(type==="duration"){
    const min=+$('#exDurMin')?.value||0,sec=+$('#exDurSec')?.value||0;
    reps=min*60+sec;
    if(!reps){alert("Süre zorunlu!");return;}
  }else{
    reps=+$('#exReps')?.value;
    if(!reps){alert("Tekrar sayısı zorunlu!");return;}
  }
  const item={name,movement_id:movementId,movementId,style_id:styleId,styleId,sets,reps,type,superset,profile_id:profileId};
  showSync("syncing","⟳ Kaydediliyor…");
  try{
    if(exEditId){
      await sbUpdate("exercises",`id=eq.${exEditId}`,{name,movement_id:movementId,style_id:styleId,sets,reps,type,superset});
      exercises=exercises.map(e=>e.id===exEditId?{...e,...item}:e);exEditId=null;
    }else{
      const id=uid();
      // Bu programa ait mevcut hareketlerin max order_index'ini bul, yeni hareket sona gitsin
      const styleExs=exercises.filter(e=>(e.styleId||e.style_id)===styleId);
      const maxOrder=styleExs.reduce((max,e)=>Math.max(max,e.order_index||0),0);
      const orderIndex=maxOrder+1;
      await sbInsert("exercises",[{id,profile_id:profileId,name,movement_id:movementId,style_id:styleId,sets,reps,type,superset,order_index:orderIndex}]);
      exercises=[...exercises,{id,...item,order_index:orderIndex}];
    }
    exForm={name:"",styleId:"",movementId:"",sets:3,reps:10,type:"reps",superset:false};cacheAll();showSync("ok","✓ Kaydedildi");render();
  }catch(e){showSync("err","⚠ Hata");console.error(e);}
}
function startExEdit(id){const ex=exercises.find(e=>e.id===id);if(!ex)return;exEditId=id;exForm={name:ex.name,styleId:ex.styleId||ex.style_id,movementId:ex.movementId||ex.movement_id,sets:ex.sets,reps:ex.reps,type:ex.type||"reps",superset:!!ex.superset};render();}
function cancelExEdit(){exEditId=null;exForm={name:"",styleId:"",movementId:"",sets:3,reps:10,type:"reps",superset:false};render();}
async function delEx(id){
  exercises=exercises.filter(e=>e.id!==id);cacheAll();
  try{await sbDelete("exercises",`id=eq.${id}`);}catch(e){console.error(e);}
  render();
}

async function moveEx(id, direction){
  const ex=exercises.find(e=>e.id===id);
  if(!ex)return;
  const styleId=ex.styleId||ex.style_id;

  // Bu programa ait hareketleri sıraya koy
  let styleExs=[...exercises.filter(e=>(e.styleId||e.style_id)===styleId)]
    .sort((a,b)=>(a.order_index??0)-(b.order_index??0));

  const idx=styleExs.findIndex(e=>e.id===id);
  if(direction==="up" && idx<=0)return;
  if(direction==="down" && idx>=styleExs.length-1)return;

  const swapIdx=direction==="up"?idx-1:idx+1;

  // Dizide yer değiştir
  const temp=styleExs[idx];
  styleExs[idx]=styleExs[swapIdx];
  styleExs[swapIdx]=temp;

  // Yeni order_index değerlerini sıfırdan ata (0,1,2,3...)
  const updates=[];
  styleExs.forEach((e,i)=>{
    if(e.order_index!==i){
      updates.push({id:e.id, order_index:i});
    }
  });

  // Local state güncelle ve hemen cihaza kaydet
  exercises=exercises.map(e=>{
    const upd=updates.find(u=>u.id===e.id);
    return upd?Object.assign({},e,{order_index:upd.order_index}):e;
  });
  cacheAll();

  // Supabase'e kaydet, sonra veriyi taze çekip aynı ekranı yenile
  showSync("syncing","⟳ Sıra kaydediliyor…");
  try{
    await Promise.all(updates.map(u=>sbUpdate("exercises",`id=eq.${u.id}`,{order_index:u.order_index})));
    // Taze veri çek ve aynı sekmeyi yeniden çiz
    await loadFromSupabase(profileId);
    const scrollY=window.scrollY;
    activeTab="admin";
    adminSec="exercises";
    render();
    setTimeout(()=>window.scrollTo(0,scrollY),50);
    showSync("ok","✓ Sıra güncellendi");
  }catch(e){
    showSync("err","⚠ Hata");
    console.error(e);
  }
}

// Süperset bağlama/ayırma UI — modal benzeri seçim
function toggleSupersetUI(id){
  const ex=exercises.find(e=>e.id===id);
  if(!ex)return;
  const styleId=ex.styleId||ex.style_id;
  const styleExs=exercises
    .filter(e=>(e.styleId||e.style_id)===styleId && e.id!==id)
    .sort((a,b)=>(a.order_index||0)-(b.order_index||0));

  // Zaten bir gruba bağlıysa — ayır seçeneği sun
  if(ex.superset_group){
    const groupMembers=exercises.filter(e=>e.superset_group===ex.superset_group);
    const names=groupMembers.map(e=>e.name).join(" + ");
    if(confirm(`"${ex.name}" şu an [${names}] süperset grubunda.\n\nGruptan ayırmak ister misin?`)){
      unlinkSuperset(id, ex.superset_group);
    }
    return;
  }

  // Bağlı değilse — hangi hareketle bağlansın seçtir
  if(!styleExs.length){alert("Bu programda bağlanacak başka hareket yok.");return;}
  const options=styleExs.map((e,i)=>`${i+1}. ${e.name}${e.superset_group?" (zaten grupta)":""}`).join("\n");
  const choice=prompt(`"${ex.name}" hangi hareketle süperset yapılsın?\n\nNumara gir:\n${options}`);
  const choiceIdx=parseInt(choice)-1;
  if(isNaN(choiceIdx)||choiceIdx<0||choiceIdx>=styleExs.length)return;
  const targetEx=styleExs[choiceIdx];
  linkSuperset(id, targetEx.id);
}

async function linkSuperset(id1, id2){
  const ex1=exercises.find(e=>e.id===id1);
  const ex2=exercises.find(e=>e.id===id2);
  if(!ex1||!ex2)return;
  // Hedef zaten bir gruptaysa, aynı gruba ekle; yoksa yeni grup oluştur
  const groupId=ex2.superset_group||uid();
  exercises=exercises.map(e=>{
    if(e.id===id1||e.id===id2)return{...e,superset_group:groupId,superset:true};
    return e;
  });
  cacheAll();
  showSync("syncing","⟳ Süperset kaydediliyor…");
  try{
    await Promise.all([
      sbUpdate("exercises",`id=eq.${id1}`,{superset_group:groupId,superset:true}),
      sbUpdate("exercises",`id=eq.${id2}`,{superset_group:groupId,superset:true}),
    ]);
    showSync("ok","✓ Süperset oluşturuldu");
  }catch(e){showSync("err","⚠ Hata");console.error(e);}
  render();
}

async function unlinkSuperset(id, groupId){
  // Gruptan sadece bu hareketi çıkar
  exercises=exercises.map(e=>{
    if(e.id===id)return{...e,superset_group:null,superset:false};
    return e;
  });
  // Grupta tek kişi kaldıysa onu da ayır
  const remaining=exercises.filter(e=>e.superset_group===groupId);
  if(remaining.length===1){
    exercises=exercises.map(e=>e.id===remaining[0].id?{...e,superset_group:null,superset:false}:e);
    await sbUpdate("exercises",`id=eq.${remaining[0].id}`,{superset_group:null,superset:false});
  }
  cacheAll();
  showSync("syncing","⟳ Kaydediliyor…");
  try{
    await sbUpdate("exercises",`id=eq.${id}`,{superset_group:null,superset:false});
    showSync("ok","✓ Süpersetten ayrıldı");
  }catch(e){showSync("err","⚠ Hata");console.error(e);}
  render();
}

async function submitStyle(){

      const id=uid();

    stForm={name:"",icon:"🏋️",color:"#e74c3c"};cacheAll();showSync("ok","✓ Kaydedildi");render();
  }catch(e){showSync("err","⚠ Hata");console.error(e);}
}
function startStEdit(id){const s=styles.find(x=>x.id===id);if(!s)return;stEditId=id;stForm={name:s.name,icon:s.icon,color:s.color};render();}

async function delStyle(id){
  styles=styles.filter(s=>s.id!==id);cacheAll();

  render();
}

  Object.values(K).forEach(k=>localStorage.removeItem(k));
